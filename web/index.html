<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PG 5e — gestionale di schede personaggio per giochi di ruolo fantasy 5e.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PG 5e">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/brand-z-180.png">

  <!-- Favicons (brand Zaknafein: mago incappucciato + spada + Z) -->
  <link rel="icon" type="image/png" sizes="16x16"  href="icons/brand-z-16.png"/>
  <link rel="icon" type="image/png" sizes="32x32"  href="icons/brand-z-32.png"/>
  <link rel="icon" type="image/png" sizes="64x64"  href="icons/brand-z-64.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/brand-z-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="icons/brand-z-512.png"/>
  <!-- Fallback per browser che ignorano l'attributo sizes -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PG 5e</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Identity Services SDK (login con Google). -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
