<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Checkout — PG 5e</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #14110d; color: #f3ead6;
    }
    .card {
      max-width: 420px; padding: 40px 32px; text-align: center;
    }
    h1 { font-size: 20px; font-weight: 700; margin: 0 0 8px; color: #d9b25a; }
    p { font-size: 15px; line-height: 1.5; color: #c9bfa8; margin: 8px 0; }
    .spinner {
      width: 34px; height: 34px; margin: 0 auto 20px; border: 3px solid #3a3326;
      border-top-color: #d9b25a; border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a.btn {
      display: inline-block; margin-top: 18px; padding: 10px 20px; border-radius: 8px;
      background: #d9b25a; color: #14110d; text-decoration: none; font-weight: 600;
    }
    .hidden { display: none; }
  </style>
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
</head>
<body>
  <div class="card">
    <div id="spinner" class="spinner"></div>
    <h1 id="title">Apertura del checkout…</h1>
    <p id="msg">Stiamo preparando il pagamento sicuro tramite Paddle.</p>
    <a id="backBtn" class="btn hidden" href="/">Torna all'app</a>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var uid = params.get('uid');
      var email = params.get('email');

      function fail(title, message) {
        document.getElementById('spinner').classList.add('hidden');
        document.getElementById('title').textContent = title;
        document.getElementById('msg').textContent = message;
        document.getElementById('backBtn').classList.remove('hidden');
      }

      if (!uid) {
        fail('Sessione non valida', 'Apri il checkout dall\'app cliccando "Acquista".');
        return;
      }

      fetch('/api/billing/config', { headers: { 'Accept': 'application/json' } })
        .then(function (r) { return r.json(); })
        .then(function (cfg) {
          if (!cfg || !cfg.enabled) {
            fail('Pagamenti non disponibili', 'Il checkout non è ancora attivo. Riprova più tardi.');
            return;
          }
          if (cfg.environment === 'sandbox') {
            Paddle.Environment.set('sandbox');
          }
          Paddle.Initialize({ token: cfg.clientToken });
          Paddle.Checkout.open({
            items: [{ priceId: cfg.priceId, quantity: 1 }],
            customer: email ? { email: email } : undefined,
            customData: { user_id: uid },
            settings: {
              displayMode: 'overlay',
              theme: 'light',
              locale: 'it',
              successUrl: window.location.origin + '/billing/success'
            }
          });
          // L'overlay è aperto sopra questa pagina; offriamo comunque un'uscita.
          document.getElementById('title').textContent = 'Completa il pagamento';
          document.getElementById('msg').textContent =
            'Segui le istruzioni nella finestra di checkout. Se l\'hai chiusa, ricarica la pagina.';
          document.getElementById('backBtn').classList.remove('hidden');
        })
        .catch(function () {
          fail('Errore di caricamento', 'Non è stato possibile avviare il checkout. Riprova più tardi.');
        });
    })();
  </script>
</body>
</html>
