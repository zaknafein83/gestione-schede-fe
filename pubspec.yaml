name: dndsheets_frontend
description: "Gestionale schede personaggio D&D 5e"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # i18n
  intl: any

  # Routing path-based su Web (usePathUrlStrategy)
  flutter_web_plugins:
    sdk: flutter

  # Stato applicativo
  flutter_riverpod: ^3.3.1

  # HTTP client
  dio: ^5.9.2

  # Routing dichiarativo (gestisce anche i deep link /verify-email?token=...)
  go_router: ^17.2.3

  # Storage sicuro per i token (lo useremo davvero a partire da F2)
  flutter_secure_storage: ^10.3.0

  # File picker per upload avatar (web + mobile)
  file_picker: ^11.0.2

  # API browser (Web) — usato per scaricare i file JSON (Blob + anchor)
  web: ^1.1.0

  # Generazione PDF (pure Dart, web-compatibile)
  pdf: ^3.11.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
