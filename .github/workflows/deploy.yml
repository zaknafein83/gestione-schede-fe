name: deploy

# Trigger su ogni push a main: build web → rsync su VPS.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Build web
        # API_BASE_URL=/api → same-origin, nginx fa proxy a backend Quarkus.
        run: flutter build web --release --dart-define=API_BASE_URL=/api

      - name: Prepare SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST:    ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null \
            || { echo "::error::chiave SSH malformata"; exit 1; }
          ssh-keyscan -4 -T 15 -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy (rsync)
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          rsync -avz --delete \
            -e "ssh -4 -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            build/web/ \
            "$VPS_USER@$VPS_HOST:/var/www/pg/"

      - name: Verify
        run: |
          curl -fsS https://pg.zaknafein.ovh -o /dev/null -w "HTTP %{http_code}\n"
